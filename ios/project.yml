name: WorthifyNative
options:
  minimumXcodeGenVersion: 2.38.0
  deploymentTarget:
    iOS: "17.0"
configs:
  Debug: debug
  Release: release
settings:
  base:
    PRODUCT_NAME: WorthifyNative
    SWIFT_VERSION: 5.10
    DEVELOPMENT_TEAM: ""
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 1.0.0
    INFOPLIST_FILE: WorthifyNative/Info.plist
    PRODUCT_BUNDLE_IDENTIFIER: com.worthify.worthify
    ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    TARGETED_DEVICE_FAMILY: "1,2"
targets:
  WorthifyNative:
    type: application
    platform: iOS
    sources:
      - WorthifyNative
    configFiles:
      Debug: Config/Debug.xcconfig
      Release: Config/Release.xcconfig
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.worthify.worthify
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    scheme:
      testTargets:
        - WorthifyNativeTests
  WorthifyNativeTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - WorthifyNativeTests
    dependencies:
      - target: WorthifyNative
