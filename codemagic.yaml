workflows:
  ios_simulator:
    name: Worthify iOS Simulator
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT_DIR: ios
        XCODE_PROJECT_NAME: WorthifyNative
        XCODE_SCHEME: WorthifyNative
        APP_DISPLAY_NAME: Worthify Native
        APP_GROUP_ID: group.com.worthify.worthify
    scripts:
      - name: Install XcodeGen
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Validate required environment variables
        script: |
          missing=0
          for var_name in SUPABASE_URL SUPABASE_ANON_KEY ARTWORK_ENDPOINT CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required environment variable: ${var_name}"
              missing=1
            else
              echo "${var_name}: present"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Write native config
        script: |
          cat > "$XCODE_PROJECT_DIR/Config/Base.xcconfig" <<EOF
          APP_DISPLAY_NAME = ${APP_DISPLAY_NAME}
          APP_GROUP_ID = ${APP_GROUP_ID}
          
          SUPABASE_URL = ${SUPABASE_URL}
          SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY}
          ARTWORK_ENDPOINT = ${ARTWORK_ENDPOINT}
          DETECT_ENDPOINT = ${DETECT_ENDPOINT}
          DETECT_AND_SEARCH_ENDPOINT = ${DETECT_AND_SEARCH_ENDPOINT}
          SEARCHAPI_KEY = ${SEARCHAPI_KEY}
          APIFY_API_TOKEN = ${APIFY_API_TOKEN}
          CLOUDINARY_CLOUD_NAME = ${CLOUDINARY_CLOUD_NAME}
          CLOUDINARY_API_KEY = ${CLOUDINARY_API_KEY}
          CLOUDINARY_API_SECRET = ${CLOUDINARY_API_SECRET}
          AMPLITUDE_API_KEY = ${AMPLITUDE_API_KEY}
          REVENUECAT_IOS_API_KEY = ${REVENUECAT_IOS_API_KEY}
          SUPERWALL_IOS_API_KEY = ${SUPERWALL_IOS_API_KEY}
          EOF
      - name: Generate Xcode project
        script: |
          cd "$XCODE_PROJECT_DIR"
          xcodegen generate
      - name: Build simulator app
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT_DIR/$XCODE_PROJECT_NAME.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - build/DerivedData/Build/Products/Debug-iphonesimulator/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
  ios_release_testflight:
    name: Worthify iOS TestFlight
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: Snaplook Codemagic
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.worthify.worthify
      xcode: latest
      vars:
        XCODE_PROJECT_DIR: ios
        XCODE_PROJECT_NAME: WorthifyNative
        XCODE_SCHEME: WorthifyNative
        APP_STORE_APPLE_ID: 6759835299
        APP_DISPLAY_NAME: Worthify Native
        APP_GROUP_ID: group.com.worthify.worthify
    scripts:
      - name: Install XcodeGen
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Validate required environment variables
        script: |
          missing=0
          for var_name in SUPABASE_URL SUPABASE_ANON_KEY ARTWORK_ENDPOINT CLOUDINARY_CLOUD_NAME CLOUDINARY_API_KEY CLOUDINARY_API_SECRET; do
            if [ -z "${!var_name}" ]; then
              echo "Missing required environment variable: ${var_name}"
              missing=1
            else
              echo "${var_name}: present"
            fi
          done
          if [ "$missing" -ne 0 ]; then
            exit 1
          fi
      - name: Write native config
        script: |
          cat > "$XCODE_PROJECT_DIR/Config/Base.xcconfig" <<EOF
          APP_DISPLAY_NAME = ${APP_DISPLAY_NAME}
          APP_GROUP_ID = ${APP_GROUP_ID}
          
          SUPABASE_URL = ${SUPABASE_URL}
          SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY}
          ARTWORK_ENDPOINT = ${ARTWORK_ENDPOINT}
          DETECT_ENDPOINT = ${DETECT_ENDPOINT}
          DETECT_AND_SEARCH_ENDPOINT = ${DETECT_AND_SEARCH_ENDPOINT}
          SEARCHAPI_KEY = ${SEARCHAPI_KEY}
          APIFY_API_TOKEN = ${APIFY_API_TOKEN}
          CLOUDINARY_CLOUD_NAME = ${CLOUDINARY_CLOUD_NAME}
          CLOUDINARY_API_KEY = ${CLOUDINARY_API_KEY}
          CLOUDINARY_API_SECRET = ${CLOUDINARY_API_SECRET}
          AMPLITUDE_API_KEY = ${AMPLITUDE_API_KEY}
          REVENUECAT_IOS_API_KEY = ${REVENUECAT_IOS_API_KEY}
          SUPERWALL_IOS_API_KEY = ${SUPERWALL_IOS_API_KEY}
          EOF
      - name: Generate Xcode project
        script: |
          cd "$XCODE_PROJECT_DIR"
          xcodegen generate
      - name: Set up code signing
        script: |
          xcode-project use-profiles \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT_DIR/$XCODE_PROJECT_NAME.xcodeproj"
      - name: Increment build number
        script: |
          cd "$CM_BUILD_DIR/$XCODE_PROJECT_DIR"
          LATEST_TESTFLIGHT_BUILD_NUMBER=$(app-store-connect get-latest-testflight-build-number "$APP_STORE_APPLE_ID" --platform IOS || echo 0)
          LATEST_APP_STORE_BUILD_NUMBER=$(app-store-connect get-latest-app-store-build-number "$APP_STORE_APPLE_ID" --platform IOS || echo 0)
          if [ "$LATEST_TESTFLIGHT_BUILD_NUMBER" -gt "$LATEST_APP_STORE_BUILD_NUMBER" ]; then
            NEXT_BUILD_NUMBER=$(($LATEST_TESTFLIGHT_BUILD_NUMBER + 1))
          else
            NEXT_BUILD_NUMBER=$(($LATEST_APP_STORE_BUILD_NUMBER + 1))
          fi
          agvtool new-version -all "$NEXT_BUILD_NUMBER"
      - name: Build ipa for distribution
        script: |
          xcode-project build-ipa \
            --project "$CM_BUILD_DIR/$XCODE_PROJECT_DIR/$XCODE_PROJECT_NAME.xcodeproj" \
            --scheme "$XCODE_SCHEME"
    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
