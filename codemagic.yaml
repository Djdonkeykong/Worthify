workflows:
  ios_simulator:
    name: Worthify iOS Simulator
    max_build_duration: 60
    instance_type: mac_mini_m2
    environment:
      xcode: latest
      vars:
        XCODE_PROJECT_DIR: ios
        XCODE_PROJECT_NAME: WorthifyNative
        XCODE_SCHEME: WorthifyNative
        APP_DISPLAY_NAME: Worthify Native
        APP_GROUP_ID: group.com.worthify.worthify
    scripts:
      - name: Install XcodeGen
        script: |
          if ! command -v xcodegen >/dev/null 2>&1; then
            brew install xcodegen
          fi
      - name: Write native config
        script: |
          cat > "$XCODE_PROJECT_DIR/Config/Base.xcconfig" <<EOF
          APP_DISPLAY_NAME = ${APP_DISPLAY_NAME}
          APP_GROUP_ID = ${APP_GROUP_ID}
          
          SUPABASE_URL = ${SUPABASE_URL}
          SUPABASE_ANON_KEY = ${SUPABASE_ANON_KEY}
          ARTWORK_ENDPOINT = ${ARTWORK_ENDPOINT}
          DETECT_ENDPOINT = ${DETECT_ENDPOINT}
          DETECT_AND_SEARCH_ENDPOINT = ${DETECT_AND_SEARCH_ENDPOINT}
          SEARCHAPI_KEY = ${SEARCHAPI_KEY}
          APIFY_API_TOKEN = ${APIFY_API_TOKEN}
          CLOUDINARY_CLOUD_NAME = ${CLOUDINARY_CLOUD_NAME}
          CLOUDINARY_API_KEY = ${CLOUDINARY_API_KEY}
          CLOUDINARY_API_SECRET = ${CLOUDINARY_API_SECRET}
          AMPLITUDE_API_KEY = ${AMPLITUDE_API_KEY}
          REVENUECAT_IOS_API_KEY = ${REVENUECAT_IOS_API_KEY}
          SUPERWALL_IOS_API_KEY = ${SUPERWALL_IOS_API_KEY}
          EOF
      - name: Generate Xcode project
        script: |
          cd "$XCODE_PROJECT_DIR"
          xcodegen generate
      - name: Build simulator app
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT_DIR/$XCODE_PROJECT_NAME.xcodeproj" \
            -scheme "$XCODE_SCHEME" \
            -configuration Debug \
            -derivedDataPath build/DerivedData \
            -destination 'platform=iOS Simulator,name=iPhone 16' \
            -sdk iphonesimulator \
            CODE_SIGNING_ALLOWED=NO \
            build
    artifacts:
      - build/DerivedData/Build/Products/Debug-iphonesimulator/*.app
      - $HOME/Library/Developer/Xcode/DerivedData/**/Logs/Test/*.xcresult
